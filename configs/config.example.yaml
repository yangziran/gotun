# ==========================================
# Gotun 核心配置文件示例
# 运行方式: ./gotun start -c configs/config.example.yaml
# ==========================================

# ------------------------------------------
# 1. 服务器配置 (servers)
# 这里定义了所有你需要用到的 SSH 服务器（如跳板机、云服务器等）。
# 你可以在下方定义多个服务器，并在 tunnels 中按 name 引用它们。
# ------------------------------------------
servers:
  - name: "jump_server"          # 服务器别名，用于在下方的 tunnels 中被唯一引用
    host: "192.168.1.100"        # SSH 服务器的 IP 或域名
    port: 22                     # SSH 端口号，通常是 22
    user: "root"                 # SSH 登录用户名
    
    # 【认证方式】(以下三选一即可，系统会自动识别):
    
    # 方式 1: 使用明文密码认证
    # password: "your_plaintext_password"
    
    # 方式 2: 使用密文密码认证 (结合 gotun encrypt 命令生成)
    # password: "您的 Base64 密文"
    # encrypted: true
    
    # 方式 3: 使用私钥文件认证 (最高推荐，更加安全)
    # key_path: "~/.ssh/id_rsa"

# ------------------------------------------
# 2. 隧道配置 (tunnels)
# 这里定义了你需要建立的具体隧道规则。
# 支持同时声明多条隧道，程序将在后台为您并发启动并维持它们的生命周期。
# ------------------------------------------
tunnels:
  # 【示例 A：本地端口转发 (Local Forwarding)】
  # 场景：访问内网数据库。把跳板机能访问到的 10.0.0.5:3306 数据库，映射到本地电脑的 33060 端口。
  # 效果：等同于命令 ssh -L 127.0.0.1:33060:10.0.0.5:3306 root@192.168.1.100
  - name: "db_tunnel"            # 隧道的标识名，用于在日志中清晰区分
    server_names: ["jump_server"] # 绑定的 SSH 服务器，支持数组形式实现负载均衡
    type: "local"                # 隧道类型: local (本地端口转发)
    local_addr: "127.0.0.1:33060" # 在你当前运行程序的电脑上监听的端口 (客户端连这里)
    remote_addr: "10.0.0.5:3306"  # 流量最终要送达的内网目标地址 (从 jump_server 的视角来看能访问的地址)

  # 【示例 B：动态代理转发 (Dynamic Forwarding)】
  # 场景：科学上网或全局内网漫游。在本地电脑建立一个 SOCKS5 代理服务器。
  # 效果：等同于命令 ssh -D 127.0.0.1:1080 root@192.168.1.100
  # 用法：浏览器或 Proxifier 配置 SOCKS5 代理为 127.0.0.1:1080 后，所有流量将从 jump_server 发出。
  - name: "socks5_proxy"
    server_names: ["jump_server"]
    type: "dynamic"              # 隧道类型: dynamic (SOCKS5 动态代理)
    local_addr: "127.0.0.1:1080" # 本地 SOCKS5 代理服务的监听端口
    # 注意: dynamic 类型的隧道具备自动路由寻址能力，因此不需要设置 remote_addr 字段
    
  # 【示例 C：远程反向转发 (Remote Forwarding / 内网穿透)】
  # 场景：将你本地正在开发的 Web 服务，暴露给外网，让外网客户可以直接用公网 IP 访问。
  # 效果：等同于命令 ssh -R 0.0.0.0:8000:127.0.0.1:8000 root@192.168.1.100
  - name: "intranet_web"
    server_names: ["jump_server"]
    type: "remote"               # 隧道类型: remote (远程反向转发)
    local_addr: "127.0.0.1:8000" # 你本地电脑上正在运行的 Web 服务地址 (数据源)
    remote_addr: "0.0.0.0:8000"  # 遥控远端 SSH 服务器，让它在公网上监听这个端口
    
    # ⚠️ 极度重要提示 (针对 Remote 穿透): 
    # 如果 remote_addr 填了 0.0.0.0 (意图允许公网任何人访问)，
    # 必须在远程跳板机上修改 /etc/ssh/sshd_config 文件，加入 `GatewayPorts yes` 选项并重启 sshd，
    # 否则 SSH 的安全策略强制将其绑定为远端的 127.0.0.1，会导致外网根本无法连入。
